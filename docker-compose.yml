# =============================================================================
# wacrm — Docker Compose for VPS deployment
# =============================================================================
# Usage:
#   1. Copy .env.local.example → .env  and fill in real values
#   2. docker compose up -d --build
#   3. Access at http://<vps-ip>:3000
#
# For HTTPS, put Nginx/Caddy/Traefik as a reverse proxy in front of port 3000.
# =============================================================================

services:
  wacrm:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars must be set at BUILD time because they get
        # inlined into the JS bundles. Pass them here or via a .env file.
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
    container_name: wacrm
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
